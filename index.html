---
layout: default
---

<style>
	#card {
		text-align: center;
		position: relative;
		top: 50%;
		transform: translate(0%, -50%);
	}

	#card>p {
		width: 80%;
		margin: auto;
	}
</style>

<div id="card">
	<h1>Johann Scott</h1>
	<h2 style="font-weight: 100;">CS Student</h2>
	<hr>
	<h3>Hey there! I'm Johann. 🤟</h3>
	<div style="font-size: 1.5em">
		<p style="font-size: 1.25em; font-style: italic;"
			<span id="age">
				<script>
					const dob = new Date(2004, 11, 16); // Javascript is stupid
					let diff = new Date(Date.now() - dob.getTime());
					let age = Math.abs(diff.getUTCFullYear() - 1970);
					document.getElementById("age").innerText += age + "-year-old";
				</script>
			</span> <noscript>2004</noscript> <b>CS Student</b> at <b>University of St Andrews.</b>
		</p>
		<p>
			Look around. Maybe you'll <b>find something.</b>
		</p>
	</div>
</div>
