content = """
It's nearly a year since I started this blog, and it's high time I looped you all in on what's been happening. Truth be told, it's been a crazy amount of time. I promise I have a point to make.

--- 

Families are difficult sometimes, and seeing my Oma deteriorate so much from dementia's been a really tough thing to watch. Trying to convince her that she needs the care she's now getting wasn't easy, but the hardest part is seeing her slip away, much like my grandmother on my mother's side. It's just over eight years ago that she died, herself suffering from Alzheimer's, and while 13-year-old me was very at peace when she passed, I can't help but feel a more immediate sense of dread for my Oma. We'll all be fine, but she's a connection to my heritage, the reason I learnt German, and a huge influence on my life. It just feels jarring seeing her faculties slowly slip away and I hope I see her a few more times before I can't any more - and I fear that day is coming soon. Thankfully it isn't all doom and gloom, because the family's grown a lot since last we spoke - I finally met my half sister, Kristy! I was excited just to meet her, but my dad was overjoyed; he hadn't seen her in years. It's been wonderful to get to know her, her husband, and my niece and nephew - I cannot wait to see them again soon and properly spend time with them. Completely separately, it turns out my maternal grandfather slept around and my mum's childhood best friend is also my aunt....

All that aside, I did some things! Passed my driving test (my car goes vroom and beep beep), got my brown belt (Rosie I'm *still* so sorry about your shoulder), recorded an album (coming out today?), got promoted at work (I actually love bartending), hitchhiked to Madrid for charity (nearly £1000, 1500 miles, and the one and only Josh Beighton), wayyyy too many in-jokes (evil botany, computer, the list goes on...), and... I got an internship at Arm! That's my summer plan - three months doing open-source firmware projects in Cambridge, with Shodokan Aikido, trips around and outside the country, and more unknown adventures dotted in too. I'm so stoked and incredibly thankful to all the people who helped me make this happen (especially Nik, Georgii, and Harry!). Genuinely my dream job at the moment and it's given me so many ideas for the future, and in a month's time I'll be there starting on something new - possibly the first step of many doing something I never dreamed I'd be able to. My LinkedIn post about it absolutely exploding was a nice flourish as well hehe.

I was really lucky to share 2025 with someone, but things ended early this year. No bad blood between us, we just have different paths to follow. Our relationship taught me a whole lot about others, about myself, about how it's all just a mess of emotions and dreams and hopes and that ultimately we haven't got a clue what we're doing - so long as our intention is always forward, we'll be okay. So, to her, σ'αγαπώ πολύ και ευχάριστο.

---

Now to make good on a promise. Two days before my driving test, someone I knew a long time ago sent me an invite on LinkedIn (see aforementioned post). Seeing her name and face brought up a memory from years ago, and threw me back into a whole situation I've been working through for nearly three years at this point - but after some advice from my close mates, six pages of thoughts and feelings (*far* too personal to post in it's entirety here), and months of waiting, it's all still up in the air. Right around the time for someone else to crop back up, thankfully a little more openly and cordially. It seems that the rich tapestry of the universe has a penchant for certain threads to keep finding each other.

So - past, present, and future. All these have got me thinking about the person I was, the person I am, and the person I will become. The allegory of Indra’s net speaks of an endless web, interconnected with jewels at every vertex, each reflecting not only the light from every other, but the reflections thereof as well. To me, this says that all things, living and otherwise, are entirely interdependent on one another for their nature. The sum of all before us, and the setting of all that comes after. My life will soon surely change. For better, for worse, or for something simply different. Part of me wants to leave St Andrews, part of me wants to stay. I do truly love this place and all it brings - my friends, the crazy things I get up to sometimes, just being a part of a community. I know I'll miss it when I do eventually leave. Looking further, I'm thinking of moving to Munich, Oslo, anywhere that feels right. Do I want another relationship? Am I right for someone else, and are they right for me? Where is the right place for me? What is my calling?

There's so many questions in my head right now, and I feel torn between a bunch of different directions - Academic, Computer Wizard, possibly a hermit? It's all very much.

Write to me soon. I'd love to hear from you. Whoever you are, whatever you think. My love, a sharp knife, a cold night.

jas

---

