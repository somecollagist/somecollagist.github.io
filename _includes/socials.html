Drop me a follow?
<ul class="socials-list horizontal-list">
	{%- for entry in site.socials -%}
	<li>
		<a {% unless entry.platform=='rss' %} rel="me" {% endunless %} href="{{ entry.link }}"
			title="Follow me on {{ entry.platform }}!">
			<symbol id="{{entry.platform}}-icon" fill-rule="evenodd" clip-rule="evenodd">
				{% include_relative {{ entry.platform | prepend: '/assets/socials/' | append: '.svg' }} %}
			</symbol>
		</a>
	</li>
	{%- endfor -%}
</ul>
